<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Rations Were Stolen! - A Dungeon Crawler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root{
      --w: 960px;
      --panel: rgba(255,255,255,0.08);
      --panel2: rgba(255,255,255,0.12);
      --txt: #e7f6ff;
      --muted: rgba(231,246,255,0.75);
      --accent: #ffd24a;
      --accent2:#7cf7ff;
      --danger:#ff4d6d;
      --ok:#7dff7a;
      --shadow: rgba(0,0,0,0.35);
      --pixel: 3;
      --font: "Press Start 2P", ui-sans-serif, system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body{
      min-height: 100vh; display: grid; place-items: center;
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(124,247,255,0.18), transparent 55%),
        radial-gradient(1100px 900px at 90% 20%, rgba(255,210,74,0.16), transparent 60%),
        linear-gradient(180deg, #0b1020, #080a12 60%, #06070c);
      color: var(--txt); font-family: var(--font);
    }
    .wrap{ width: min(var(--w), calc(100vw - 24px)); padding: 16px; }
    .frame{
      position: relative; border-radius: 22px; overflow: hidden;
      box-shadow: 0 22px 55px var(--shadow);
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    }
    .hud{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:10px 14px;
      background: linear-gradient(90deg, rgba(124,247,255,0.1), rgba(255,210,74,0.09));
      border-bottom:1px solid rgba(255,255,255,0.12); font-size:10px;
    }
    .hud .left, .hud .right{ display:flex; align-items:center; gap:12px; flex-wrap: wrap; }
    .pill{
      padding: 4px 10px; border-radius: 999px; background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.14); color: var(--muted); white-space: nowrap;
    }
    .hpbar{
      width: 180px; height: 10px; border-radius:999px; overflow:hidden;
      background: rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25);
    }
    .hpbar > i{ display:block; height:100%; width:100%; background: linear-gradient(90deg, var(--danger), #ffb703, var(--ok)); transform-origin:left center; }
    .lives{ display:flex; gap:6px; align-items:center; }
    .heart{ width:14px; height:14px; background:var(--danger); clip-path: polygon(50% 90%, 8% 50%, 8% 26%, 26% 12%, 50% 24%, 74% 12%, 92% 26%, 92% 50%); filter: drop-shadow(0 2px 0 rgba(0,0,0,0.35)); opacity:0.95; }
    .heart.empty{ opacity:0.18; }
    canvas{ width:100%; height:560px; display:block; image-rendering:pixelated; background:transparent; }
    .overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:18px; background:rgba(0,0,0,0.55); backdrop-filter: blur(6px); }
    .overlay.hidden{ display:none; }
    .panel{
      width:min(860px,100%); border-radius:18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border:1px solid rgba(255,255,255,0.14); box-shadow:0 20px 50px rgba(0,0,0,0.45); padding:18px;
    }
    .title{ font-size:20px; line-height: 1.4; font-weight:800; letter-spacing:0.6px; }
    .sub{ margin-top:8px; color:var(--muted); line-height:1.4; font-size:11px; }
    .grid{ margin-top:14px; display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:10px; }
    @media (max-width:840px){ .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
    .card{
      background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.14); border-radius:14px; padding:10px; cursor:pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease; user-select:none;
    }
    .card .thumb-wrap{
      border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,0.12);
      height:140px;
      display:flex; justify-content:center; align-items:flex-end;
      background: rgba(0,0,0,0.18);
    }
    .card .thumb{
      width:auto;
      max-width:100%;
      max-height:100%;
      height:100%;
      display:block;
      image-rendering:pixelated;
      object-fit: contain;
      object-position: center bottom;
    }
    .thumb-zoom-2x{
      transform: scale(2);
      transform-origin: center center;
      object-position: center center;
    }
    .card:hover{ transform: translateY(-2px); border-color: rgba(255,255,255,0.26); background: rgba(0,0,0,0.32); }
    .card.selectedP1{ outline:2px solid rgba(124,247,255,0.85); }
    .card.selectedP2{ outline:2px solid rgba(255,210,74,0.85); }
    .card.locked{
      cursor:not-allowed;
      opacity: .75;
      transform: none !important;
    }
    .card.locked:hover{ border-color: rgba(255,255,255,0.14); background: rgba(0,0,0,0.25); }
    .card.locked .thumb{
      filter: grayscale(1) saturate(0.2);
    }
    .card.locked .name{
      color: rgba(231,246,255,0.55);
    }
    .card .stats{
      font-size: 10px; color: var(--muted); margin-top: 8px; 
      line-height: 1.5;
    }
    .card .stats b { color: var(--txt); font-weight: 700; }
    .card .skill-desc{
      font-size: 10px; color: var(--accent); margin-top: 6px; 
      line-height: 1.4; font-weight: 600; text-shadow: 0 0 8px rgba(255,210,74,0.35);
    }
    .card .name{ margin-top:8px; font-weight:700; font-size:12px; }
    .thumb-wrap{ position: relative; }
    .badge-evil{
      position:absolute; left:8px; top:8px;
      padding:2px 8px; border-radius:999px;
      background: rgba(120,16,32,.95); color:#fff; font-size:10px; font-weight:800;
      border:1px solid rgba(255,120,120,0.35);
      box-shadow: 0 4px 10px rgba(0,0,0,.35);
    }
    .tags{ margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; }
    .tag{ font-size:12px; padding:3px 8px; border-radius:999px; border:1px solid rgba(255,255,255,0.14); color:var(--muted); background:rgba(255,255,255,0.06); }
    .row{ margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .pick{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .pick b{ color:var(--txt); }
    .btn{
      padding:10px 14px; border-radius:12px; border:none; color:#081018; font-weight:800; cursor:pointer; font-size: 11px;
      box-shadow:0 12px 25px rgba(0,0,0,0.35); background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    .btn:disabled{ cursor:not-allowed; opacity:.45; filter:grayscale(.8); }
    .btn.secondary{ background:rgba(255,255,255,0.10); color:var(--txt); border:1px solid rgba(255,255,255,0.16); box-shadow:none; }
    .help{ margin-top:14px; color:rgba(231,246,255,0.72); font-size:10px; line-height:1.5; }
    .kbd{ display:inline-block; padding:1px 7px; border-radius:8px; background:rgba(0,0,0,0.32); border:1px solid rgba(255,255,255,0.14); font-weight:700; color:rgba(231,246,255,0.9); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <div class="hud">
        <div class="left">
          <div class="pill">Boss HP</div>
          <div class="hpbar" title="Boss HP"><i id="bossHpFill"></i></div>
          <div class="pill">HP: <b id="bossHpText">50</b>/<b id="bossHpMax">50</b></div>
        </div>
        <div class="right">
          <div class="pill">Player 1 <span id="p1Name">?</span> <span id="p1SkillText"></span></div>
          <div class="lives" id="p1Lives"></div>
          <div class="pill">Shield: <b id="p1Shield">0</b></div>
          <div class="pill">Player 2 <span id="p2Name">?</span> <span id="p2SkillText"></span></div>
          <div class="lives" id="p2Lives"></div>
          <div class="pill">Shield: <b id="p2Shield">0</b></div>
          <div class="pill">P1: <span class="kbd">A</span>/<span class="kbd">D</span> Move · <span class="kbd">Space</span> Shoot · <span class="kbd">C</span> Skill</div>
          <div class="pill">P2: <span class="kbd">Numpad 1</span>/<span class="kbd">3</span> Move · <span class="kbd">0</span> Shoot · <span class="kbd">5</span> Skill</div>
        </div>
      </div>
      <canvas id="cv" width="960" height="560"></canvas>
      <div class="overlay" id="overlay"><div class="panel" id="panel"></div></div>
    </div>
  </div>
  <script>
    (() => {
      const canvas = document.getElementById('cv');
      const ctx = canvas.getContext('2d', { alpha: true });
      ctx.imageSmoothingEnabled = false;
      const overlay = document.getElementById('overlay');
      const panel = document.getElementById('panel');
      const bossHpFill = document.getElementById('bossHpFill');
      const bossHpText = document.getElementById('bossHpText');
      const bossHpMax = document.getElementById('bossHpMax');
      const p1LivesEl = document.getElementById('p1Lives');
      const p2LivesEl = document.getElementById('p2Lives');
      const p1NameEl = document.getElementById('p1Name');
      const p2NameEl = document.getElementById('p2Name');
      const p1SkillText = document.getElementById('p1SkillText');
      const p2SkillText = document.getElementById('p2SkillText');
      const p1ShieldEl = document.getElementById('p1Shield');
      const p2ShieldEl = document.getElementById('p2Shield');
      const W = canvas.width, H = canvas.height, px = 4;
      const COLORS = {
        sky1:'#0b1638', sky2:'#060814', neon1:'#7cf7ff', neon2:'#ffd24a',
        white:'#e7f6ff', black:'#0a0d14', red:'#ff4d6d', green:'#7dff7a',
        blue:'#5a7dff', purple:'#b884ff', pink:'#ff7ad9', orange:'#ff9b3d', gray:'#89a0b3',
      };
      const clamp = (v,a,b) => Math.max(a, Math.min(b,v));
      const rand = (a,b) => Math.random()*(b-a)+a;
      const aabb = (a,b) => !(a.x+a.w<=b.x||a.x>=b.x+b.w||a.y+a.h<=b.y||a.y>=b.y+b.h);
      const drawPixelRect = (x,y,w,h,c)=>{ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); };
      function drawText(x,y,text,color,scale=2){ ctx.save(); ctx.imageSmoothingEnabled=false; ctx.translate(x,y); ctx.scale(scale,scale); ctx.font='8px monospace'; ctx.fillStyle=color; ctx.fillText(text,0,0); ctx.restore(); }

      const CHARACTERS = [
        { id:'cowcat', name:'Ninja Oreo', c1:'#ffffff', c2:'#111827', acc:COLORS.neon1, hp: 2, dmg: 2, skill: 'shield', skillUses: 2 },
        { id:'wizard', name:'Sage Cheri', c1:'#6b3f2a', c2:'#3b2466', acc:COLORS.neon2, hp: 4, dmg: 0.5, skill: 'group_heal', skillUses: 2 },
        { id:'knight', name:'Wizard Enos', c1:'#8aa0b3', c2:'#263244', acc:'#a3ffea', hp: 3, dmg: 1, skill: 'big_shot', skillUses: 2 },
        { id:'cinn', name:'Pet Mr.Star', c1:'#f7f2ff', c2:'#9fd7ff', acc:'#ffb3c7', hp: 3, dmg: 1, skill: 'healing_shot', skillUses: 2 },
      ];
      const CHARACTER_IMAGE_PATHS = {
        cowcat: 'character_pixel/cat.PNG',
        cinn: 'character_pixel/dog.PNG',
        knight: 'character_pixel/knight.PNG',
        wizard: 'character_pixel/wizard.PNG',
      };
      const characterImages = new Map();
      const WEAPON_IMAGE_PATHS = {
        cowcat: 'character_pixel/cat_weapon.png',
        wizard: 'character_pixel/wizard_weapon.png',
        knight: 'character_pixel/knight_weapon.png',
        cinn: 'character_pixel/dog_weapon.png',
      };
      const weaponImages = new Map();
      const STAGE_IMAGES = {
        stage1Win: 'stages/gamewin_1.jpg',
        stage2Win: 'stages/gamewin_2.jpg',
        stage1Lose: 'stages/gameover_1.jpg',
        stage2Lose: 'stages/gameover_2.png',
        stage2Intro1: 'stages/black1.jpeg',
        stage2Intro2: 'stages/black2.jpg',
        happyEnding: 'stages/happyending.jpeg',
      };
      const stageImages = new Map();
      const bossStage1Image = new Image();
      bossStage1Image.src = 'character_pixel/dragon.png';
      const bossStage1BombImage = new Image();
      bossStage1BombImage.src = 'character_pixel/boss1_bomb.png';
      const bossStage2Image = new Image();
      bossStage2Image.src = 'character_pixel/boss2.PNG';
      const bossStage2BombImage = new Image();
      bossStage2BombImage.src = 'character_pixel/boss2_bomb.PNG';
      const gameplayBackgroundImage = new Image();
      gameplayBackgroundImage.src = 'stages/background.png';
      const stageBgm = {
        1: new Audio('music/Battle1_Shatter the Core.mp3'),
        2: new Audio('music/Battle2_Void Hunger.mp3'),
      };
      const stage2IntroSfx = new Audio('music/black.mp3');
      const resultSfx = {
        win: new Audio('music/victory.mp3'),
        lose: new Audio('music/fail.mp3'),
      };
      let activeBgmStage = null;
      for(const key of Object.keys(stageBgm)){
        const bgm = stageBgm[key];
        bgm.loop = true;
        bgm.preload = 'auto';
        bgm.volume = 0.45;
      }
      stage2IntroSfx.loop = false;
      stage2IntroSfx.preload = 'auto';
      stage2IntroSfx.volume = 0.65;
      for(const key of Object.keys(resultSfx)){
        const sfx = resultSfx[key];
        sfx.loop = false;
        sfx.preload = 'auto';
        sfx.volume = 0.65;
      }
      function stopStage2IntroSfx(){
        stage2IntroSfx.pause();
        stage2IntroSfx.currentTime = 0;
      }
      function playStage2IntroSfx(){
        stopStage2IntroSfx();
        const playPromise = stage2IntroSfx.play();
        if(playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
      }
      let sfxCtx = null;
      function ensureSfxCtx(){
        if(!sfxCtx){
          const AC = window.AudioContext || window.webkitAudioContext;
          if(!AC) return null;
          sfxCtx = new AC();
        }
        if(sfxCtx.state === 'suspended'){
          const p = sfxCtx.resume();
          if(p && typeof p.catch === 'function') p.catch(() => {});
        }
        return sfxCtx;
      }
      function playPlayerHitSfx(){
        const ctx = ensureSfxCtx();
        if(!ctx) return;
        const now = ctx.currentTime;
        const master = ctx.createGain();
        master.gain.setValueAtTime(0.9, now);
        master.connect(ctx.destination);

        // Heavy low-end impact.
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(145, now);
        osc.frequency.exponentialRampToValueAtTime(55, now + 0.22);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.42, now + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
        osc.connect(gain);
        gain.connect(master);
        osc.start(now);
        osc.stop(now + 0.26);

        // Short noise burst for punch.
        const bufferSize = Math.floor(ctx.sampleRate * 0.16);
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2 - 1) * (1 - i / bufferSize);
        const noise = ctx.createBufferSource();
        noise.buffer = noiseBuffer;
        const noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = 'lowpass';
        noiseFilter.frequency.setValueAtTime(980, now);
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.0001, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.24, now + 0.008);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(master);
        noise.start(now);
        noise.stop(now + 0.16);
      }
      function playBossHitSfx(){
        const ctx = ensureSfxCtx();
        if(!ctx) return;
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(520, now);
        osc.frequency.exponentialRampToValueAtTime(760, now + 0.04);
        osc.frequency.exponentialRampToValueAtTime(640, now + 0.11);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.13);
      }
      function stopAllBgm(){
        for(const key of Object.keys(stageBgm)){
          const bgm = stageBgm[key];
          bgm.pause();
          bgm.currentTime = 0;
        }
        activeBgmStage = null;
      }
      function playResultSfx(kind){
        const sfx = resultSfx[kind];
        if(!sfx) return;
        for(const key of Object.keys(resultSfx)){
          const audio = resultSfx[key];
          audio.pause();
          audio.currentTime = 0;
        }
        const playPromise = sfx.play();
        if(playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
      }
      function syncBgm(){
        if(game.state!=='playing' || !stageBgm[game.stage]){
          if(activeBgmStage!==null) stopAllBgm();
          return;
        }
        if(activeBgmStage===game.stage) return;
        stopAllBgm();
        const bgm = stageBgm[game.stage];
        const playPromise = bgm.play();
        if(playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
        activeBgmStage = game.stage;
      }
      function getStage1BossSize(){
        const targetW = 280;
        const targetH = 200;
        if(!(bossStage1Image.complete && bossStage1Image.naturalWidth>0 && bossStage1Image.naturalHeight>0)){
          return { w: targetW, h: targetH };
        }
        const scale = Math.min(targetW / bossStage1Image.naturalWidth, targetH / bossStage1Image.naturalHeight);
        return {
          w: Math.max(1, Math.round(bossStage1Image.naturalWidth * scale)),
          h: Math.max(1, Math.round(bossStage1Image.naturalHeight * scale)),
        };
      }
      function getStage2BossSize(){
        const targetW = Math.round(88 * 6);
        const targetH = Math.round(52 * 6);
        if(!(bossStage2Image.complete && bossStage2Image.naturalWidth>0 && bossStage2Image.naturalHeight>0)){
          return { w: targetW, h: targetH };
        }
        const scale = Math.min(targetW / bossStage2Image.naturalWidth, targetH / bossStage2Image.naturalHeight);
        return {
          w: Math.max(1, Math.round(bossStage2Image.naturalWidth * scale)),
          h: Math.max(1, Math.round(bossStage2Image.naturalHeight * scale)),
        };
      }
      function preloadCharacterImages(){
        for(const ch of CHARACTERS){
          const src = CHARACTER_IMAGE_PATHS[ch.id];
          const img = new Image();
          if(src) img.src = src;
          characterImages.set(ch.id, img);
        }
      }
      function preloadWeaponImages(){
        for(const ch of CHARACTERS){
          const src = WEAPON_IMAGE_PATHS[ch.id];
          const img = new Image();
          if(src) img.src = src;
          weaponImages.set(ch.id, img);
        }
      }
      function preloadStageImages(){
        for(const key of Object.keys(STAGE_IMAGES)){
          const img = new Image();
          img.src = STAGE_IMAGES[key];
          stageImages.set(key, img);
        }
      }
      const STAGE_CONFIGS = {
        1: { hp: 50, speed: 120, dropMin: .45, dropMax: 1.05 },
        2: { hp: 80, speed: 180, dropMin: .25, dropMax: .7 },
      };
      const FACE_SPRITES = {
        cowcat:["...F..F.....","..FF..FF....",".FFFWWFFF...","FFFFWWFFFF..","FFFDFDFFFF..","FFFF..FFFF..","FFF.D..DFF..","FFF..AAFFF..","FFFF....FFFF",".FFFFFFFFFF.","..FFFFFFFF..","...FFFFFF..."],
        wizard:["...DDDDDD...","..DDDDADDD..",".DDDDDDDDDD.","...FFFFF....","..FFFFFFF...",".FFFWWWWFFF.",".FFFD..DFFF.",".FFF.D..DFF.",".FFFF.AFFFF.","..FFFFFFFF..","...FFFFFF...","....FFFF...."],
        knight:["...FFFFFF...","..FFFFFFFF..",".FFFFFFFFFF.",".FFFFWWFFFF.",".FFFAAA.AFFF.",".FFFAADDAFFF.",".FFFAADDAFFF.",".FFFF..FFFF..","..FFF....FFF.","..FFFFFFFFFF.","...FFFFFFF...","....FFFFF...."],
        cinn:["F.........F..","FF..F..F..FF.",".F.FFFFFF.F..","..FFFFFFF....",".FFFWWWWFFF..",".FFFD..DFFF..",".FFF.D..DFF..",".FFFF.AFFFF..",".FFF..AAFFF..","..FFFFFFFFF..","...FFFFFFF...","....FFFFF...."],
      };
      function drawSprite(g,sprite,palette,x,y,scale){
        for(let r=0;r<(sprite||[]).length;r++){ const row=sprite[r];
          for(let c=0;c<row.length;c++){ const ch=row[c]; if(ch==='.'||!palette[ch]) continue;
            g.fillStyle=palette[ch]; g.fillRect(x+c*scale,y+r*scale,scale,scale);
          }
        }
      }
      function makeAvatarCanvas(char){
        const c=document.createElement('canvas'); c.width=96; c.height=64;
        const g=c.getContext('2d'); g.imageSmoothingEnabled=false;
        g.fillStyle='rgba(0,0,0,0.22)'; g.fillRect(0,0,c.width,c.height);
        const palette={F:char.c1,D:char.c2,A:char.acc,W:'#ffffff'};
        drawSprite(g, FACE_SPRITES[char.id]||FACE_SPRITES.cowcat, palette, 24, 8, 4);
        g.fillStyle='rgba(124,247,255,0.35)'; for(let i=0;i<10;i++) g.fillRect(0,56+i,c.width,1);
        return c;
      }
      const avatarCanvases = new Map(CHARACTERS.map(ch => [ch.id, makeAvatarCanvas(ch)]));

      const game = {
        state:'select', t:0, shake:0, stars:[], boss:null, players:[], bullets:[], bombs:[], diveBombs: [], fx:[],

        const x=Math.round(b.x), y=Math.round(b.y);
        if(bossStage1Image.complete && bossStage1Image.naturalWidth>0){
          ctx.save();
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(bossStage1Image, x, y, b.w, b.h);
          ctx.restore();
        }
      };
      const spawnBullet=(p, options = {})=>{
        const { isSkill = false } = options;
        let dmg = p.dmg;
        let scale = 1;
        let isHealingShot = false;

        if (isSkill) {
            if (p.skill === 'big_shot') {
                dmg = 3;
                scale = 3;
            } else if (p.skill === 'healing_shot') {
                scale = 2;
                isHealingShot = true;
            }
        }

        game.bullets.push({
          x:p.x+p.w/2-px*4*scale,
          y:p.y-px*5,
          w:px*8*scale,
          h:px*8*scale,
          vy:-520,
          dmg: dmg,
          isHealingShot: isHealingShot,
          color:p.color,
          weapon: weaponImages.get(p.charId),
        });
      };
      const spawnBomb=(options = {})=>{
        const { fromBoss = false, randomSize = false } = options;

        const baseBombScale = game.stage === 1 ? 2 : 1;
        const scaleMultiplier = randomSize ? rand(0.75, 1.5) : 1;
        const bombScale = baseBombScale * scaleMultiplier;
        const bombSize = px * 6 * bombScale;

        const bombX = fromBoss
            ? game.boss.x + game.boss.w / 2 - bombSize / 2
            : rand(bombSize / 2, W - bombSize / 2);

        const bombY = fromBoss
            ? game.boss.y + game.boss.h - px * 2
            : -bombSize;

        game.bombs.push({
          x: bombX,
          y: bombY,
          w: bombSize,
          h: bombSize,
          vy:rand(260,380),
        });
      };
      function hurtPlayer(p, damage = 1){
        if(p.lives<=0 || p.inv > 0) return;
        if (p.shield > 0) {
            p.shield = Math.max(0, p.shield - 1);
            game.fx.push({t:0,x:p.x+p.w/2,y:p.y+p.h/2,color:COLORS.blue}); // Shield hit effect
            updateHUD();
            return;
        }
        p.lives=Math.max(0, p.lives - damage);
        p.inv=.9; game.shake=.18; game.fx.push({t:0,x:p.x+p.w/2,y:p.y+p.h/2,color:COLORS.red}); playPlayerHitSfx(); updateHUD();
      }
      function hurtBoss(damage, isHealingShot){
        if(!game.boss) return;
        game.boss.hp=Math.max(0,game.boss.hp-damage);

        if (isHealingShot) {
            game.players.forEach(p => {
                if (p.lives > 0) {
                    p.lives = Math.min(p.maxLives, p.lives + 1);
                }
            });
        }

        game.fx.push({t:0,x:game.boss.x+game.boss.w/2,y:game.boss.y+game.boss.h/2,color:COLORS.neon2});
        playBossHitSfx();
        if(game.boss.hp<=0){ game.state='win'; showOverlayEnd('win'); }
        updateHUD();
      }
      const allPlayersDead=()=>game.players.every(p=>p.lives<=0);
      function activateSkill(p){
        if(p.skillUses <= 0 || p.skillCooldown > 0) return;

        p.skillUses -= 1;
        p.skillCooldown = 1; // 1 second cooldown after use

        if(p.skill === 'shield'){
            p.shield = 2;
        } else if (p.skill === 'group_heal'){
            game.players.forEach(player => {
                if(player.lives > 0){
                    player.lives = Math.min(player.maxLives, player.lives + 1);
                }
            });
        } else if (p.skill === 'big_shot'){
            spawnBullet(p, { isSkill: true });
        } else if (p.skill === 'healing_shot'){
            spawnBullet(p, { isSkill: true });
        }

        updateHUD();
      }

      function update(dt){
        game.t+=dt; if(game.shake>0) game.shake=Math.max(0,game.shake-dt);
        const b=game.boss;

        // Boss 1 specific logic
        if (game.stage === 1) {
            game.cooldowns.bossDive -= dt;
            if (b.hp <= b.maxHp / 2 && game.cooldowns.bossDive <= 0) {
                const targetPlayer = game.players.find(p => p.lives > 0);
                if (targetPlayer) {
                    game.diveBombs.push({
                        x: targetPlayer.x + targetPlayer.w / 2 - b.w / 2, // Target the player
                        y: -b.h, // Start from top
                        w: b.w,
                        h: b.h,
                        vy: 480, // Fast dive speed
                    });
                }
                game.cooldowns.bossDive = rand(3, 5); // Cooldown for next dive
            }
        }

        // Boss 2 (Mr. Star) floats in both phases
        if (game.stage === 2) {
          const floatAmplitude = 8; // Pixels up and down
          const floatFrequency = 0.4; // Floating speed
          b.y = b.baseY + Math.sin(game.t * floatFrequency * Math.PI * 2) * floatAmplitude;
        } else {
          b.y = b.baseY; // Boss 1 (Dragon) has a fixed Y position
        }

        // Horizontal movement logic
        if(game.stage === 2 && b.hp > b.maxHp / 2) {
          // Phase 1 of Stage 2: Stand still in the center
          b.x = W/2 - b.w/2;
        } else {
          // Stage 1 or Phase 2 of Stage 2: Move left and right
          b.x+=b.vx*dt; if(b.x<24){b.x=24; b.vx*=-1;} if(b.x+b.w>W-24){b.x=W-24-b.w; b.vx*=-1;}
        }
        game.cooldowns.bossBomb-=dt;
        if(game.cooldowns.bossBomb<=0){
            const isStage2 = game.stage === 2;
            const isPhase1 = isStage2 && b.hp > b.maxHp / 2;
            const isPhase2 = isStage2 && !isPhase1;

            if (game.stage === 1) {
                spawnBomb({ fromBoss: true, randomSize: true });
            } else if (isPhase1) {
                spawnBomb({ fromBoss: false });
            } else if (isPhase2) {
                spawnBomb({ fromBoss: true }); // From boss
                spawnBomb({ fromBoss: false }); // And from top
            } else {
                // Fallback for any other state
                spawnBomb({ fromBoss: true });
            }

            game.cooldowns.bossBomb=rand(b.dropMin,b.dropMax);
        }
        for(const p of game.players){
          p.inv=Math.max(0,p.inv-dt);
          p.skillCooldown=Math.max(0,p.skillCooldown-dt);
        }
        const p1=game.players[0], p2=game.players[1]; p1.vx=(game.input.p1Right?1:0)-(game.input.p1Left?1:0); p2.vx=(game.input.p2Right?1:0)-(game.input.p2Left?1:0);
        for(const p of game.players){ if(p.lives<=0) continue; p.x += p.vx*p.speed*dt; p.x = clamp(p.x,14,W-14-p.w); }
        game.cooldowns.p1=Math.max(0,game.cooldowns.p1-dt); game.cooldowns.p2=Math.max(0,game.cooldowns.p2-dt);
        if(game.input.p1Fire && game.cooldowns.p1<=0 && p1.lives>0){ spawnBullet(p1); game.cooldowns.p1=.16; }
        if(game.input.p2Fire && game.cooldowns.p2<=0 && p2.lives>0){ spawnBullet(p2); game.cooldowns.p2=.16; }
        if(game.input.p1Skill){ activateSkill(p1); game.input.p1Skill=false; }
        if(game.input.p2Skill){ activateSkill(p2); game.input.p2Skill=false; }
        for(const blt of game.bullets) blt.y += blt.vy*dt;
        game.bullets = game.bullets.filter(blt => blt.y + blt.h > -20);
        for(const blt of game.bullets){ if(aabb(blt,{x:b.x,y:b.y,w:b.w,h:b.h})){ blt._dead=true; hurtBoss(blt.dmg, blt.isHealingShot); } }
        game.bullets = game.bullets.filter(x => !x._dead);
        for(const bb of game.bombs) bb.y += bb.vy*dt;
        for(const bb of game.bombs){ for(const p of game.players){ if(p.lives<=0) continue; if(aabb(bb,p)){ bb._dead=true; hurtPlayer(p); } } }
        game.bombs = game.bombs.filter(bb => !bb._dead && bb.y < H + 30);

        for(const db of game.diveBombs) db.y += db.vy*dt;
        for(const db of game.diveBombs){ for(const p of game.players){ if(p.lives<=0) continue; if(aabb(db,p)){ db._dead=true; hurtPlayer(p, 2); } } } // Dive bomb does 2 damage
        game.diveBombs = game.diveBombs.filter(db => !db._dead && db.y < H + 30);

        for(const f of game.fx) f.t += dt; game.fx = game.fx.filter(f => f.t < .5);
        if(allPlayersDead()){ game.state='over'; showOverlayEnd('over'); }
      }
      function drawFX(){ for(const f of game.fx){ const k=1-f.t/.5; ctx.save(); ctx.globalAlpha=.9*k; ctx.strokeStyle=f.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(f.x,f.y,8+26*(1-k),0,Math.PI*2); ctx.stroke(); ctx.restore(); } }
      function drawScene(dt){
        drawBackground(dt);
        if(game.shake>0){ const s=Math.round(game.shake*10); ctx.save(); ctx.translate((Math.random()*2-1)*s,(Math.random()*2-1)*s); drawBoss(game.boss); for(const bb of game.bombs) drawBomb(bb); for(const db of game.diveBombs) drawDiveBomb(db); for(const blt of game.bullets) drawBullet(blt); for(const p of game.players) drawPlayerShip(p); drawFX(); ctx.restore(); }
        else { drawBoss(game.boss); for(const bb of game.bombs) drawBomb(bb); for(const db of game.diveBombs) drawDiveBomb(db); for(const blt of game.bullets) drawBullet(blt); for(const p of game.players) drawPlayerShip(p); drawFX(); }
        drawText(16,H-18,`STAGE ${game.stage} · BOSS HP ${game.boss.hp}/${game.boss.maxHp}`,'rgba(231,246,255,0.85)',2);
      }
      let last=0; function loop(ts){ const now=ts/1000; if(!last) last=now; const dt=clamp(now-last,0,.033); last=now;
        if(game.state==='playing'){ update(dt); drawScene(dt); } else { game.t+=dt; drawBackground(dt); if(game.boss&&game.players.length){ drawBoss(game.boss); for(const p of game.players) drawPlayerShip(p);} }
        requestAnimationFrame(loop);
      }
      const isP1Left = e => e.code === 'KeyA';
      const isP1Right = e => e.code === 'KeyD';
      const isP1Fire = e => e.code === 'Space';
      const isP1Skill = e => e.code === 'KeyC';
      const isP2Left = e => e.code === 'Numpad1';
      const isP2Right = e => e.code === 'Numpad3';
      const isP2Fire = e => e.code === 'Numpad0';
      const isP2Skill = e => e.code === 'Numpad5';

      window.addEventListener('keydown',(e)=>{
        if(e.key && e.key.length===1){
          game.nnnBuffer = (game.nnnBuffer + e.key.toLowerCase()).slice(-3);
          game.mmmBuffer = (game.mmmBuffer + e.key.toLowerCase()).slice(-3);
          game.kkkBuffer = (game.kkkBuffer + e.key.toLowerCase()).slice(-3);
          game.lllBuffer = (game.lllBuffer + e.key.toLowerCase()).slice(-3);
          if(game.nnnBuffer==='nnn'){ game.nnnBuffer=''; game.mmmBuffer=''; game.kkkBuffer=''; game.lllBuffer=''; game.stage = 1; if(!game.boss || !game.players.length) resetPlay(1); showFirstStageWin(); return; }
          if(game.mmmBuffer==='mmm'){ game.mmmBuffer=''; game.nnnBuffer=''; game.kkkBuffer=''; game.lllBuffer=''; game.stage = 2; if(!game.boss || !game.players.length) resetPlay(2); showSecondStageWin(); return; }
          if(game.kkkBuffer==='kkk'){ game.kkkBuffer=''; game.lllBuffer=''; game.nnnBuffer=''; game.mmmBuffer=''; game.stage = 1; if(!game.boss || !game.players.length) resetPlay(1); showFirstStageLose(); return; }
          if(game.lllBuffer==='lll'){ game.lllBuffer=''; game.kkkBuffer=''; game.nnnBuffer=''; game.mmmBuffer=''; game.stage = 2; if(!game.boss || !game.players.length) resetPlay(2); showSecondStageLose(); return; }
        }
        if(e.code==='KeyR'){ if(game.state==='playing') resetPlay(game.stage); else if(game.state==='result'){ overlay.classList.add('hidden'); game.state='playing'; resetPlay(game.stage); } }
        if(game.state==='result' && game.stage===1 && game.boss?.hp<=0 && (e.code==='Space' || e.code==='Enter')){ e.preventDefault(); showStage2IntroScreen(); return; }
        if(game.state!=='playing') return;
        
        if(isP1Left(e)) game.input.p1Left=true;
        if(isP1Right(e)) game.input.p1Right=true;
        if(isP1Fire(e)){ game.input.p1Fire=true; e.preventDefault(); }
        if(isP1Skill(e)) game.input.p1Skill=true;

        if(isP2Left(e)) game.input.p2Left=true;
        if(isP2Right(e)) game.input.p2Right=true;
        if(isP2Fire(e)) game.input.p2Fire=true;
        if(isP2Skill(e)) game.input.p2Skill=true;

      }, {passive:false});

      window.addEventListener('keyup',(e)=>{
        if(isP1Left(e)) game.input.p1Left=false;
        if(isP1Right(e)) game.input.p1Right=false;
        if(isP1Fire(e)) game.input.p1Fire=false;
        if(isP1Skill(e)) game.input.p1Skill=false;

        if(isP2Left(e)) game.input.p2Left=false;
        if(isP2Right(e)) game.input.p2Right=false;
        if(isP2Fire(e)) game.input.p2Fire=false;
        if(isP2Skill(e)) game.input.p2Skill=false;
      });
      preloadCharacterImages();
      preloadWeaponImages();
      preloadStageImages();
      initStars(); game.selected.p1=CHARACTERS[0].id; game.selected.p2=CHARACTERS[1].id; resetPlay(1); showOverlaySelect(); requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
